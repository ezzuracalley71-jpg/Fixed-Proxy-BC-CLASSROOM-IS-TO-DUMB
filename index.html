<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>classroomspot os</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{width:100vw;height:100dvh;overflow:hidden;font-family:'Outfit',-apple-system,sans-serif;background:#000}
#bg{position:fixed;inset:0;z-index:0}
#bg-img{width:100%;height:100%;object-fit:cover}
#bg-vid{width:100%;height:100%;object-fit:cover;display:none}
.overlay{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.3) 0%,transparent 25%,transparent 55%,rgba(0,0,0,.5) 100%);z-index:1;pointer-events:none}
.statusbar{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:50;pointer-events:none}
.clock{color:#fff;font-size:16px;font-weight:600;letter-spacing:-.3px;text-shadow:0 1px 8px rgba(0,0,0,.8)}
.stat-icons{display:flex;align-items:center;gap:6px}
.desktop{position:fixed;top:54px;left:0;right:0;bottom:110px;padding:14px 18px;display:grid;--snap-cell-w:74px;--snap-cell-h:88px;--snap-gap-x:8px;--snap-gap-y:6px;grid-template-columns:repeat(auto-fill,var(--snap-cell-w));grid-auto-rows:var(--snap-cell-h);column-gap:var(--snap-gap-x);row-gap:var(--snap-gap-y);justify-content:start;align-content:start;z-index:10;overflow-y:auto}
.desktop::-webkit-scrollbar{display:none}
.aicon{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding-top:4px;position:relative;touch-action:none;width:64px;min-width:64px;max-width:64px;justify-self:center}
.aicon{transition:transform .22s cubic-bezier(.22,.61,.36,1)}
.aicon.wiggle .iw{animation:wiggle .18s infinite alternate ease-in-out}
@keyframes wiggle{from{transform:rotate(-2.5deg)}to{transform:rotate(2.5deg)}}
.iw{width:58px;height:58px;border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5);flex-shrink:0;transition:transform .1s}
.aicon:not(.wiggle):active .iw{transform:scale(.88)}
.iw img{width:100%;height:100%;object-fit:cover;display:block;-webkit-user-drag:none;user-select:none;pointer-events:none}
.ilabel{color:#fff;font-size:10.5px;font-weight:500;text-shadow:0 1px 5px rgba(0,0,0,.9);text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;user-select:none}
.xbadge{position:absolute;top:-6px;left:-6px;width:20px;height:20px;background:#ff3b30;border-radius:50%;color:#fff;font-size:15px;font-weight:700;display:none;align-items:center;justify-content:center;z-index:20;cursor:pointer}
.wmode .xbadge{display:flex}
.dock{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.18);backdrop-filter:blur(28px) saturate(1.8);-webkit-backdrop-filter:blur(28px) saturate(1.8);border-radius:30px;padding:10px 18px;display:flex;gap:12px;z-index:50;border:1px solid rgba(255,255,255,.28);box-shadow:0 8px 32px rgba(0,0,0,.35)}
.dicon{display:flex;align-items:center;justify-content:center;cursor:pointer}
.dicon .iw{width:54px;height:54px}
.dicon:active .iw{transform:scale(.88)}
.win{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:#0d0d0d;transform:translateY(100%);transition:transform .36s cubic-bezier(.25,.46,.45,.94),opacity .36s;opacity:0;pointer-events:none}
.win.open{transform:translateY(0);opacity:1;pointer-events:all}
.winbar{height:52px;background:#0e0e0e;display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.backbtn{width:34px;height:34px;background:rgba(255,255,255,.1);border-radius:50%;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.backbtn:active{background:rgba(255,255,255,.22)}
.winbar h2{color:#fff;font-size:17px;font-weight:600}
.ifr-wrap{flex:1;position:relative;overflow:hidden}
.ifr-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
.drawwrap{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.drawtool{height:54px;background:#161616;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.cswatch{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,.4);position:relative;flex-shrink:0;overflow:hidden;cursor:pointer}
.cswatch input[type="color"]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);opacity:0;cursor:pointer;border:none}
.cdot{width:100%;height:100%;border-radius:50%;background:#000;pointer-events:none}
.brange{flex:1;accent-color:#fff}
.dbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#fff;padding:6px 12px;border-radius:10px;cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;white-space:nowrap}
.dbtn.on{background:rgba(239,68,68,.3);border-color:rgba(239,68,68,.5);color:#fca5a5}
#cvs{display:block;touch-action:none;cursor:crosshair;flex:1;min-height:0;width:100%}
.sbody{flex:1;overflow-y:auto;background:#111;color:#fff}
.sbody::-webkit-scrollbar{display:none}
.stabbar{position:sticky;top:0;z-index:3;display:flex;gap:8px;padding:12px 14px;background:rgba(17,17,17,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.08)}
.stab{border:none;background:rgba(255,255,255,.08);color:#a8a8a8;padding:8px 14px;border-radius:12px;font-family:'Outfit',-apple-system,sans-serif;font-weight:600;font-size:12px;letter-spacing:.02em;cursor:pointer;transition:background .18s,color .18s,transform .12s}
.stab:active{transform:scale(.97)}
.stab.active{background:#0a84ff;color:#fff}
.spanel{display:none}
.spanel.show{display:block}
.ssec{padding:20px}
.stitle{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-bottom:12px}
.wpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.wpcard{aspect-ratio:9/17;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;border:3px solid transparent;transition:border-color .2s,transform .15s}
.wpcard:active{transform:scale(.95)}
.wpcard.sel{border-color:#0a84ff}
.wpcard img,.wpcard video{width:100%;height:100%;object-fit:cover;display:block}
.wplive{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap}
.wpchk{position:absolute;top:6px;right:6px;width:20px;height:20px;background:#0a84ff;border-radius:50%;align-items:center;justify-content:center;font-size:11px;display:none}
.wpcard.sel .wpchk{display:flex}
.srow{background:rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.srl{font-size:15px;font-weight:500}
.srr{font-size:14px;color:#888}
.sselect{min-width:170px;background:#111;border:1px solid rgba(255,255,255,.24);color:#fff;border-radius:10px;padding:7px 10px;font-family:'Outfit',-apple-system,sans-serif;font-size:13px}
.sselect option{background:#000;color:#fff}
.sbtn{background:#0a84ff;border:none;color:#fff;padding:8px 12px;border-radius:10px;font-family:'Outfit',-apple-system,sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.sbtn.off{background:rgba(255,255,255,.14);color:#ddd}
.sfoot{padding:28px 20px 50px;text-align:center;color:#333;font-size:13px}
</style>
</head>

  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, c.width, c.height);
}
function saveCvs() {
  var a = document.createElement("a");
  a.download = "drawing.png";
  a.href = document.getElementById("cvs").toDataURL();
  a.click();
}

initWpLoop();
initCloak();
</script>
</body>
</html>
