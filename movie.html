<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ClassFlix</title>
  <style>
    :root {
      --netflix-red: #E50914;
      --netflix-red-hover: #F40612;
      --dark-bg: #141414;
      --darker-bg: #000000;
      --gray-text: #808080;
      --light-gray: #B3B3B3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: var(--darker-bg);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #welcomeOverlay {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeOut 1s ease 2.5s forwards;
      pointer-events: none;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    .welcome-text {
      font-size: 72px;
      font-weight: 900;
      color: var(--netflix-red);
      opacity: 0;
      transform: scale(0.5);
      animation: welcomeIn 1.5s ease forwards;
      text-transform: uppercase;
      letter-spacing: 8px;
    }

    @keyframes welcomeIn {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    #authScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://assets.nflxext.com/ffe/siteui/vlv3/9d3533b2-0e2b-40b2-95e0-ecd7979cc88b/a3873901-5b7c-46eb-b9fa-12fea5197bd3/IN-en-20240311-popsignuptwoweeks-perspective_alpha_website_large.jpg');
      background-size: cover;
      background-position: center;
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-container {
      background: rgba(0, 0, 0, 0.85);
      padding: 60px 68px 40px;
      width: 100%;
      max-width: 450px;
      min-height: 600px;
    }

    .auth-container h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      height: 50px;
      background: #333;
      border: none;
      border-radius: 4px;
      padding: 16px 20px 0;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .input-group label {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #8C8C8C;
      font-size: 16px;
      transition: all 0.2s;
      pointer-events: none;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: 12px;
      font-size: 11px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--netflix-red);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
    }

    .btn-primary:hover {
      background: var(--netflix-red-hover);
    }

    .auth-footer {
      margin-top: 50px;
      color: #737373;
      font-size: 16px;
      text-align: center;
    }

    .auth-footer a {
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-error {
      color: #E87C03;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    #accountOverlay {
      position: fixed;
      inset: 0;
      background: var(--darker-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 6000;
      transition: opacity 0.5s ease;
    }

    #accountOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .account-bg {
      position: absolute;
      inset: 0;
      opacity: 0.3;
      z-index: 0;
      transition: opacity 1s ease;
    }

    .account-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #accountBox {
      background: rgba(0, 0, 0, 0.9);
      padding: 50px;
      width: calc(100% - 60px);
      max-width: 1000px;
      text-align: center;
      position: relative;
      z-index: 1;
      border-radius: 8px;
    }

    #accountBox h1 {
      color: white;
      font-size: 48px;
      margin-bottom: 30px;
      font-weight: 400;
    }

    .accounts-grid {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 40px 0;
      flex-wrap: wrap;
    }

    .account-card {
      background: transparent;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
      width: 150px;
    }

    .account-card:hover {
      transform: scale(1.05);
    }

    .account-card:hover .account-pfp {
      border: 3px solid white;
    }

    .account-pfp {
      width: 150px;
      height: 150px;
      border-radius: 8px;
      object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid transparent;
      background: #333;
    }

    .account-name {
      font-size: 18px;
      color: #808080;
      transition: color 0.2s;
    }

    .account-card:hover .account-name {
      color: white;
    }

    .add-profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .add-icon {
      width: 150px;
      height: 150px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      color: #808080;
      margin-bottom: 15px;
    }

    .add-profile:hover .add-icon {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .manage-btn {
      background: transparent;
      border: 1px solid #808080;
      color: #808080;
      padding: 12px 40px;
      font-size: 16px;
      letter-spacing: 2px;
      margin-top: 40px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .manage-btn:hover {
      border-color: white;
      color: white;
    }

    #profileModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 7000;
    }

    #profileModal.active {
      display: flex;
    }

    .profile-edit-box {
      background: var(--dark-bg);
      padding: 40px;
      border-radius: 8px;
      max-width: 500px;
      width: 90%;
    }

    .profile-edit-box h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    .file-input-wrapper {
      margin: 20px 0;
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    .file-label {
      display: inline-block;
      padding: 10px 20px;
      background: #333;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    .file-label:hover {
      background: #444;
    }

    .preview-img {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      object-fit: cover;
      margin: 10px 0;
      display: none;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 4%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.4s;
    }

    header.scrolled {
      background: var(--dark-bg);
    }

    .logo {
      color: var(--netflix-red);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      margin-left: 40px;
    }

    .nav-links a {
      color: #E5E5E5;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #B3B3B3;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    #searchInput {
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 8px 35px 8px 12px;
      border-radius: 4px;
      width: 0;
      opacity: 0;
      transition: all 0.3s;
      font-size: 14px;
    }

    #searchInput.active {
      width: 250px;
      opacity: 1;
    }

    .search-btn {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-left: -30px;
      z-index: 2;
      width: 20px;
      height: 20px;
      position: relative;
    }

    .search-btn::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-radius: 50%;
    }

    .search-btn::after {
      content: "";
      position: absolute;
      top: 60%;
      left: 60%;
      width: 8px;
      height: 2px;
      background: white;
      transform: rotate(45deg);
      transform-origin: left;
    }

    .current-profile {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      object-fit: cover;
    }

    .hero {
      position: relative;
      height: 80vh;
      min-height: 600px;
      display: flex;
      align-items: flex-end;
      padding: 0 4% 150px;
      background-size: cover;
      background-position: center;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(to top, var(--darker-bg) 0%, transparent 60%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }

    .hero-title {
      font-size: 60px;
      font-weight: 800;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .hero-meta {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      font-size: 16px;
      align-items: center;
    }

    .match {
      color: #46D369;
      font-weight: 600;
    }

    .hero-desc {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 30px;
      color: #D2D2D2;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
    }

    .btn-play {
      background: white;
      color: black;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-play:hover {
      background: rgba(255,255,255,0.8);
    }

    .btn-more {
      background: rgba(109, 109, 110, 0.7);
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-more:hover {
      background: rgba(109, 109, 110, 0.4);
    }

    .content-row {
      padding: 0 4%;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
    }

    .row-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #E5E5E5;
    }

    .row-container {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding: 10px 0;
      scrollbar-width: none;
    }

    .row-container::-webkit-scrollbar {
      display: none;
    }

    .movie-card {
      flex: 0 0 auto;
      width: 16%;
      min-width: 200px;
      position: relative;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
    }

    .movie-card img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      display: block;
    }

    .top-ten-card {
      position: relative;
      display: flex;
      align-items: center;
      margin-right: 40px;
    }

    .top-number {
      font-size: 200px;
      font-weight: 900;
      color: black;
      -webkit-text-stroke: 4px #595959;
      line-height: 1;
      margin-right: -40px;
      z-index: 1;
      font-family: Impact, sans-serif;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .top-ten-card .movie-card {
      width: 120px;
      min-width: 120px;
    }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 40px 12px 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .movie-card:hover .card-info {
      opacity: 1;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.5);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .action-btn:hover {
      border-color: white;
      background: white;
      color: black;
    }

    .action-btn.favorited {
      background: var(--netflix-red);
      border-color: var(--netflix-red);
    }

    .card-meta {
      font-size: 10px;
      color: #46D369;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-tags {
      font-size: 10px;
      color: #B3B3B3;
    }

    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      z-index: 1000;
      overflow-y: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #modal.active {
      display: block;
      opacity: 1;
    }

    .modal-content {
      max-width: 900px;
      margin: 40px auto;
      background: var(--dark-bg);
      border-radius: 8px;
      overflow: hidden;
    }

    .modal-video {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
    }

    .modal-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #181818;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: #333;
    }

    .modal-body {
      padding: 30px;
    }

    .modal-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-meta {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .modal-rating {
      border: 1px solid rgba(255,255,255,0.4);
      padding: 2px 8px;
      font-size: 12px;
    }

    .modal-desc {
      font-size: 16px;
      line-height: 1.6;
      color: #D2D2D2;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .modal-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      align-items: center;
      flex-wrap: wrap;
    }

    .server-select {
      background: #333;
      color: white;
      border: 1px solid #444;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
    }

    .more-like-this {
      margin-top: 40px;
    }

    .more-like-this h3 {
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .similar-card {
      background: #2F2F2F;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }

    .similar-card:hover {
      opacity: 0.8;
    }

    .similar-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .similar-info {
      padding: 12px;
    }

    .similar-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .similar-meta {
      color: #808080;
      font-size: 12px;
    }

    .preview-fallback {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .preview-fallback img {
      width: 200px;
      height: 300px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .preview-text {
      font-size: 24px;
      font-weight: 600;
      color: white;
    }

    .preview-badge {
      background: var(--netflix-red);
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .auth-container { padding: 40px 30px; }
      .hero-title { font-size: 40px; }
      .movie-card { width: 33%; min-width: 120px; }
      .top-number { font-size: 100px; margin-right: -20px; }
      .similar-grid { grid-template-columns: 1fr; }
      .accounts-grid { gap: 15px; }
      .account-card, .add-icon { width: 100px; height: 100px; }
      .account-pfp { width: 100px; height: 100px; }
      .welcome-text { font-size: 40px; }
    }
  </style>
<base target="_blank">
</head>
<body>

  <div id="welcomeOverlay">
    <div class="welcome-text">ClassFlix</div>
  </div>

  <div id="authScreen">
    <div class="auth-container" id="loginForm">
      <h1>Sign In</h1>
      <div class="input-group">
        <input type="text" id="loginUsername" placeholder=" " required>
        <label>Username</label>
      </div>
      <div class="input-group">
        <input type="password" id="loginPassword" placeholder=" " required>
        <label>Password</label>
      </div>
      <div class="auth-error" id="loginError">Invalid credentials</div>
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>
      <div class="auth-footer">
        New to ClassFlix? <a onclick="showSignup()">Sign up now</a>
      </div>
    </div>

    <div class="auth-container" id="signupForm" style="display: none;">
      <h1>Sign Up</h1>
      <div class="input-group">
        <input type="text" id="signupUsername" placeholder=" " required>
        <label>Username</label>
      </div>
      <div class="input-group">
        <input type="password" id="signupPassword" placeholder=" " required>
        <label>Password</label>
      </div>
      <div class="input-group">
        <input type="password" id="signupConfirm" placeholder=" " required>
        <label>Confirm Password</label>
      </div>
      <div class="auth-error" id="signupError"></div>
      <button class="btn-primary" onclick="handleSignup()">Sign Up</button>
      <div class="auth-footer">
        Already have an account? <a onclick="showLogin()">Sign in</a>
      </div>
    </div>
  </div>

  <div id="accountOverlay">
    <div class="account-bg" id="accountBg"></div>
    <div id="accountBox">
      <h1>Who's watching?</h1>
      <div class="accounts-grid" id="accountsGrid"></div>
      <button class="manage-btn" onclick="toggleManageMode()" id="manageBtn">Manage Profiles</button>
    </div>
  </div>

  <div id="profileModal">
    <div class="profile-edit-box">
      <h2 id="profileModalTitle">Add Profile</h2>
      <input type="text" id="profileNameInput" placeholder="Profile Name" style="width: 100%; padding: 12px; background: #333; border: none; color: white; border-radius: 4px; margin-bottom: 10px;">
      <div class="file-input-wrapper">
        <img id="profilePreview" class="preview-img">
        <label class="file-label">
          Choose Profile Picture
          <input type="file" id="profileImageInput" accept="image/*" onchange="previewImage(event)">
        </label>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn-primary" onclick="saveProfile()" style="flex: 1;">Save</button>
        <button class="btn-primary" onclick="closeProfileModal()" style="flex: 1; background: #333;">Cancel</button>
        <button class="btn-primary" onclick="deleteProfile()" id="deleteProfileBtn" style="flex: 1; background: #c62828; display: none;">Delete</button>
      </div>
    </div>
  </div>

  <div id="mainApp" style="display: none;">
    <header id="mainHeader">
      <div style="display: flex; align-items: center;">
        <div class="logo" onclick="scrollToTop()">CLASSFLIX</div>
        <nav class="nav-links">
          <a onclick="loadHome()">Home</a>
          <a onclick="filterContent('tv')">TV Shows</a>
          <a onclick="filterContent('movie')">Movies</a>
          <a onclick="filterContent('anime')">Anime</a>
          <a onclick="filterContent('action')">Action</a>
          <a onclick="filterContent('comedy')">Comedy</a>
          <a onclick="filterContent('horror')">Horror</a>
          <a onclick="filterContent('scifi')">Sci-Fi</a>
          <a onclick="showMyList()">My List</a>
        </nav>
      </div>
      <div class="nav-right">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Titles, people, genres">
          <button class="search-btn" onclick="toggleSearch()"></button>
        </div>
        <img id="headerProfileImg" class="current-profile" onclick="switchProfile()">
      </div>
    </header>

    <div class="hero" id="heroSection">
      <div class="hero-content">
        <h1 class="hero-title" id="heroTitle"></h1>
        <div class="hero-meta">
          <span class="match" id="heroMatch"></span>
          <span id="heroYear"></span>
          <span class="modal-rating" id="heroRating"></span>
        </div>
        <p class="hero-desc" id="heroDesc"></p>
        <div class="hero-buttons">
          <button class="btn-play" onclick="playFeatured()">
            <span>▶</span> Play
          </button>
          <button class="btn-more" onclick="showFeaturedDetails()">
            <span>ⓘ</span> More Info
          </button>
        </div>
      </div>
    </div>

    <div id="contentRows"></div>
  </div>

  <div id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-video" id="modalVideoContainer">
        <div id="previewContainer" class="preview-fallback">
          <img id="previewPoster" src="" alt="Preview">
          <div class="preview-badge">Preview</div>
        </div>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta">
          <span class="match" id="modalMatch"></span>
          <span id="modalYear"></span>
          <span class="modal-rating" id="modalRating"></span>
          <span id="modalDuration"></span>
        </div>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-controls">
          <button class="btn-play" onclick="playCurrent()" style="width: auto;">
            <span>▶</span> Play
          </button>
          <button class="action-btn" id="modalFavoriteBtn" onclick="toggleCurrentFavorite()">+</button>
          <select class="server-select" id="sourceSelect" onchange="changeServer()">
            <option value="vidsrc">VidSrc</option>
            <option value="embed">Embed.su</option>
            <option value="moviesapi">MoviesAPI</option>
            <option value="vidlink">VidLink</option>
            <option value="autoembed">AutoEmbed</option>
          </select>
        </div>
        <div class="more-like-this">
          <h3>More Like This</h3>
          <div class="similar-grid" id="similarGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
    const baseURL = 'https://api.themoviedb.org/3';

    let currentUser = null;
    let currentProfile = null;
    let profiles = [];
    let manageMode = false;
    let editingProfileIndex = -1;
    let currentItem = null;
    let featuredItem = null;
    let myList = [];
    let currentServer = 'vidsrc';
    let bgInterval = null;
    let allContent = [];
    let previewTimeout = null;

    function showSignup() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('signupForm').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    }

    function handleSignup() {
      const username = document.getElementById('signupUsername').value;
      const pass = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const error = document.getElementById('signupError');

      if (!username || !pass) {
        error.textContent = 'Please fill all fields';
        error.style.display = 'block';
        return;
      }

      if (pass !== confirm) {
        error.textContent = 'Passwords do not match';
        error.style.display = 'block';
        return;
      }

      const users = JSON.parse(localStorage.getItem('classflix_users') || '[]');
      if (users.find(u => u.username === username)) {
        error.textContent = 'Username already registered';
        error.style.display = 'block';
        return;
      }

      users.push({ username, password: pass });
      localStorage.setItem('classflix_users', JSON.stringify(users));

      currentUser = username;
      localStorage.setItem('classflix_current_user', username);
      document.getElementById('authScreen').style.display = 'none';
      initProfiles();
    }

    function handleLogin() {
      const username = document.getElementById('loginUsername').value;
      const pass = document.getElementById('loginPassword').value;
      const error = document.getElementById('loginError');

      const users = JSON.parse(localStorage.getItem('classflix_users') || '[]');
      const user = users.find(u => u.username === username && u.password === pass);

      if (!user) {
        error.style.display = 'block';
        return;
      }

      currentUser = username;
      localStorage.setItem('classflix_current_user', username);
      document.getElementById('authScreen').style.display = 'none';
      initProfiles();
    }

    function initProfiles() {
      document.getElementById('accountOverlay').style.display = 'flex';

      const allProfiles = JSON.parse(localStorage.getItem('classflix_profiles') || '{}');
      profiles = allProfiles[currentUser] || [];

      const allLists = JSON.parse(localStorage.getItem('classflix_mylists') || '{}');
      myList = allLists[currentUser] || [];

      if (profiles.length === 0) {
        profiles.push({
          name: 'Profile 1',
          image: 'https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png',
          id: Date.now()
        });
        saveProfiles();
      }

      renderProfiles();
      startBackgroundRotation();
    }

    function saveProfiles() {
      const allProfiles = JSON.parse(localStorage.getItem('classflix_profiles') || '{}');
      allProfiles[currentUser] = profiles;
      localStorage.setItem('classflix_profiles', JSON.stringify(allProfiles));
    }

    function startBackgroundRotation() {
      updateBackground();
      bgInterval = setInterval(updateBackground, 7000);
    }

    async function updateBackground() {
      try {
        const res = await fetch(`${baseURL}/trending/all/week?api_key=${API_KEY}`);
        const data = await res.json();
        const item = data.results[Math.floor(Math.random() * data.results.length)];
        const bg = document.getElementById('accountBg');
        if (item && item.backdrop_path) {
          bg.innerHTML = `<img src="https://image.tmdb.org/t/p/original${item.backdrop_path}" alt="">`;
        }
      } catch (e) {
        console.error('Background error', e);
      }
    }

    function renderProfiles() {
      const grid = document.getElementById('accountsGrid');
      grid.innerHTML = '';

      profiles.forEach((profile, index) => {
        const card = document.createElement('div');
        card.className = 'account-card';
        card.onclick = () => selectProfile(index);
        card.innerHTML = `
          <img src="${profile.image}" class="account-pfp" alt="${profile.name}">
          <div class="account-name">${profile.name}</div>
        `;
        if (manageMode) {
          card.innerHTML += '<div style="position: absolute; top: 5px; right: 5px; background: white; color: black; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;">✎</div>';
        }
        grid.appendChild(card);
      });

      if (profiles.length < 5 && !manageMode) {
        const addBtn = document.createElement('div');
        addBtn.className = 'add-profile';
        addBtn.onclick = addProfile;
        addBtn.innerHTML = `
          <div class="add-icon">+</div>
          <div class="account-name">Add Profile</div>
        `;
        grid.appendChild(addBtn);
      }

      document.getElementById('manageBtn').textContent = manageMode ? 'Done' : 'Manage Profiles';
    }

    function selectProfile(index) {
      if (manageMode) {
        editProfile(index);
        return;
      }

      if (bgInterval) clearInterval(bgInterval);

      currentProfile = profiles[index];
      document.getElementById('accountOverlay').classList.add('hidden');
      document.getElementById('headerProfileImg').src = currentProfile.image;
      setTimeout(() => {
        document.getElementById('accountOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        initMainApp();
      }, 500);
    }

    function toggleManageMode() {
      manageMode = !manageMode;
      renderProfiles();
    }

    function addProfile() {
      if (profiles.length >= 5) return;
      editingProfileIndex = -1;
      document.getElementById('profileModalTitle').textContent = 'Add Profile';
      document.getElementById('profileNameInput').value = '';
      document.getElementById('profilePreview').style.display = 'none';
      document.getElementById('deleteProfileBtn').style.display = 'none';
      document.getElementById('profileModal').classList.add('active');
    }

    function editProfile(index) {
      editingProfileIndex = index;
      const profile = profiles[index];
      document.getElementById('profileModalTitle').textContent = 'Edit Profile';
      document.getElementById('profileNameInput').value = profile.name;
      const preview = document.getElementById('profilePreview');
      preview.src = profile.image;
      preview.style.display = 'block';
      document.getElementById('deleteProfileBtn').style.display = 'block';
      document.getElementById('profileModal').classList.add('active');
    }

    function previewImage(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const preview = document.getElementById('profilePreview');
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    function saveProfile() {
      const name = document.getElementById('profileNameInput').value;
      const preview = document.getElementById('profilePreview');
      const image = preview.style.display === 'none' ? 'https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png' : preview.src;

      if (!name) return;

      if (editingProfileIndex === -1) {
        profiles.push({ name, image, id: Date.now() });
      } else {
        profiles[editingProfileIndex] = { ...profiles[editingProfileIndex], name, image };
      }

      saveProfiles();
      closeProfileModal();
      renderProfiles();
    }

    function deleteProfile() {
      if (editingProfileIndex > -1) {
        profiles.splice(editingProfileIndex, 1);
        saveProfiles();
        closeProfileModal();
        renderProfiles();
      }
    }

    function closeProfileModal() {
      document.getElementById('profileModal').classList.remove('active');
    }

    function switchProfile() {
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('accountOverlay').style.display = 'flex';
      document.getElementById('accountOverlay').classList.remove('hidden');
      manageMode = false;
      renderProfiles();
      startBackgroundRotation();
    }

    async function initMainApp() {
      await loadHero();
      await loadRows();
      setupScrollListener();
    }

    async function loadHero() {
      try {
        const res = await fetch(`${baseURL}/trending/all/week?api_key=${API_KEY}`);
        const data = await res.json();
        featuredItem = data.results[Math.floor(Math.random() * Math.min(5, data.results.length))];

        document.getElementById('heroTitle').textContent = featuredItem.title || featuredItem.name;
        document.getElementById('heroDesc').textContent = featuredItem.overview;
        document.getElementById('heroYear').textContent = (featuredItem.release_date || featuredItem.first_air_date || '').substring(0, 4);
        document.getElementById('heroMatch').textContent = Math.floor(Math.random() * 20 + 80) + '% Match';
        document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${featuredItem.backdrop_path})`;

        const cert = await getCertification(featuredItem);
        document.getElementById('heroRating').textContent = cert || 'TV-MA';
      } catch (e) {
        console.error('Hero load error', e);
      }
    }

    async function getCertification(item) {
      try {
        if (item.media_type === 'tv' || item.first_air_date) {
          const res = await fetch(`${baseURL}/tv/${item.id}/content_ratings?api_key=${API_KEY}`);
          const data = await res.json();
          const us = data.results?.find(r => r.iso_3166_1 === 'US');
          return us?.rating || 'TV-MA';
        } else {
          const res = await fetch(`${baseURL}/movie/${item.id}/release_dates?api_key=${API_KEY}`);
          const data = await res.json();
          const us = data.results?.find(r => r.iso_3166_1 === 'US');
          return us?.release_dates?.[0]?.certification || 'R';
        }
      } catch (e) {
        return 'NR';
      }
    }

    async function loadRows() {
      const container = document.getElementById('contentRows');
      container.innerHTML = '';

      if (myList.length > 0) {
        await createRow('My List', myList, container);
      }

      const trending = await fetchCategory('trending/all/week');
      await createTopTenRow(trending.slice(0, 10), container);

      const anime = await fetchCategory('discover/tv', { with_genres: 16 });
      await createRow('Anime', anime, container);

      const action = await fetchCategory('discover/movie', { with_genres: 28 });
      await createRow('Action & Adventure', action, container);

      const comedy = await fetchCategory('discover/movie', { with_genres: 35 });
      await createRow('Comedies', comedy, container);

      const horror = await fetchCategory('discover/movie', { with_genres: 27 });
      await createRow('Horror Movies', horror, container);

      const scifi = await fetchCategory('discover/movie', { with_genres: 878 });
      await createRow('Sci-Fi & Fantasy', scifi, container);

      const romance = await fetchCategory('discover/movie', { with_genres: 10749 });
      await createRow('Romance', romance, container);

      const docs = await fetchCategory('discover/movie', { with_genres: 99 });
      await createRow('Documentaries', docs, container);

      const tv = await fetchCategory('tv/popular');
      await createRow('Popular TV Shows', tv, container);

      const movies = await fetchCategory('movie/popular');
      await createRow('Popular Movies', movies, container);

      const thriller = await fetchCategory('discover/movie', { with_genres: 53 });
      await createRow('Thrillers', thriller, container);

      const animation = await fetchCategory('discover/movie', { with_genres: 16 });
      await createRow('Animated Movies', animation, container);

      const crime = await fetchCategory('discover/tv', { with_genres: 80 });
      await createRow('Crime TV Shows', crime, container);

      const drama = await fetchCategory('discover/tv', { with_genres: 18 });
      await createRow('Drama Series', drama, container);
    }

    async function fetchCategory(endpoint, params = {}) {
      try {
        const queryParams = new URLSearchParams({ api_key: API_KEY, language: 'en-US', ...params });
        const res = await fetch(`${baseURL}/${endpoint}?${queryParams}`);
        const data = await res.json();
        return data.results || [];
      } catch (e) {
        return [];
      }
    }

    async function createRow(title, items, container) {
      if (!items || items.length === 0) return;

      const row = document.createElement('div');
      row.className = 'content-row';

      const header = document.createElement('h2');
      header.className = 'row-title';
      header.textContent = title;
      row.appendChild(header);

      const scrollContainer = document.createElement('div');
      scrollContainer.className = 'row-container';

      for (let item of items) {
        if (!item) continue;
        const card = await createMovieCard(item);
        if (card) scrollContainer.appendChild(card);
      }

      row.appendChild(scrollContainer);
      container.appendChild(row);
    }

    async function createTopTenRow(items, container) {
      if (!items || items.length === 0) return;

      const row = document.createElement('div');
      row.className = 'content-row';

      const header = document.createElement('h2');
      header.className = 'row-title';
      header.textContent = 'Top 10 in U.S. Today';
      row.appendChild(header);

      const scrollContainer = document.createElement('div');
      scrollContainer.className = 'row-container';

      items.forEach((item, index) => {
        if (!item) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'top-ten-card';

        const num = document.createElement('div');
        num.className = 'top-number';
        num.textContent = index + 1;

        const card = document.createElement('div');
        card.className = 'movie-card';
        const imgPath = item.poster_path 
          ? `https://image.tmdb.org/t/p/w500${item.poster_path}` 
          : 'https://via.placeholder.com/500x750/141414/808080?text=No+Image';

        const isFav = myList.some(i => i.id === item.id);

        card.innerHTML = `
          <img src="${imgPath}" alt="${item.title || item.name}">
          <div class="card-info">
            <div class="card-actions">
              <button class="action-btn" onclick="playItem(${item.id}, '${item.media_type || (item.first_air_date ? 'tv' : 'movie')}', event)">▶</button>
              <button class="action-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite(${item.id}, event)">
                ${isFav ? '✓' : '+'}
              </button>
            </div>
          </div>
        `;

        card.onclick = (e) => {
          if (!e.target.closest('.action-btn')) {
            openModal(item);
          }
        };

        wrapper.appendChild(num);
        wrapper.appendChild(card);
        scrollContainer.appendChild(wrapper);
      });

      row.appendChild(scrollContainer);
      container.appendChild(row);
    }

    async function createMovieCard(item) {
      if (!item) return null;

      // Add to allContent for My List functionality
      if (!allContent.find(i => i.id === item.id)) {
        allContent.push(item);
      }

      const card = document.createElement('div');
      card.className = 'movie-card';

      const imgPath = item.poster_path 
        ? `https://image.tmdb.org/t/p/w500${item.poster_path}` 
        : 'https://via.placeholder.com/500x750/141414/808080?text=No+Image';

      const isFav = myList.some(i => i.id === item.id);
      const year = (item.release_date || item.first_air_date || '').substring(0, 4);

      card.innerHTML = `
        <img src="${imgPath}" alt="${item.title || item.name}">
        <div class="card-info">
          <div class="card-actions">
            <button class="action-btn" onclick="playItem(${item.id}, '${item.media_type || (item.first_air_date ? 'tv' : 'movie')}', event)">▶</button>
            <button class="action-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite(${item.id}, '${item.media_type || (item.first_air_date ? 'tv' : 'movie')}', event)">
              ${isFav ? '✓' : '+'}
            </button>
          </div>
          <div class="card-meta">${Math.floor(Math.random() * 20 + 80)}% Match</div>
          <div class="card-tags">${item.adult ? '18+' : '13+'} • ${year || '2024'}</div>
        </div>
      `;

      card.onclick = (e) => {
        if (!e.target.closest('.action-btn')) {
          openModal(item);
        }
      };

      return card;
    }

    async function openModal(item) {
      currentItem = item;
      const modal = document.getElementById('modal');

      document.getElementById('modalTitle').textContent = item.title || item.name;
      document.getElementById('modalDesc').textContent = item.overview;
      document.getElementById('modalYear').textContent = (item.release_date || item.first_air_date || '').substring(0, 4);
      document.getElementById('modalMatch').textContent = Math.floor(Math.random() * 20 + 80) + '% Match';
      document.getElementById('modalDuration').textContent = item.runtime ? `${item.runtime} min` : '2h 15m';

      const cert = await getCertification(item);
      document.getElementById('modalRating').textContent = cert || 'NR';

      updateModalFavoriteBtn();

      // Show preview with poster
      showPreview(item);

      await loadSimilar(item);

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function showPreview(item) {
      const container = document.getElementById('previewContainer');
      const poster = document.getElementById('previewPoster');

      const imgPath = item.poster_path 
        ? `https://image.tmdb.org/t/p/w500${item.poster_path}` 
        : (item.backdrop_path 
          ? `https://image.tmdb.org/t/p/original${item.backdrop_path}` 
          : 'https://via.placeholder.com/500x750/141414/808080?text=No+Image');

      poster.src = imgPath;
      poster.alt = item.title || item.name;

      // Auto-close preview after 5 seconds and show similar content hint
      if (previewTimeout) clearTimeout(previewTimeout);
      previewTimeout = setTimeout(() => {
        // Preview stays visible but we could add auto-play functionality here
      }, 5000);
    }

    async function loadSimilar(item) {
      try {
        const type = item.media_type || (item.first_air_date ? 'tv' : 'movie');
        const res = await fetch(`${baseURL}/${type}/${item.id}/similar?api_key=${API_KEY}`);
        const data = await res.json();
        const similar = data.results?.slice(0, 6) || [];

        const grid = document.getElementById('similarGrid');
        grid.innerHTML = '';

        similar.forEach(sim => {
          const card = document.createElement('div');
          card.className = 'similar-card';
          card.onclick = () => {
            openModal(sim);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const imgPath = sim.backdrop_path 
            ? `https://image.tmdb.org/t/p/w500${sim.backdrop_path}` 
            : 'https://via.placeholder.com/500x280/2F2F2F/808080?text=No+Image';

          card.innerHTML = `
            <img src="${imgPath}" alt="${sim.title || sim.name}">
            <div class="similar-info">
              <div class="similar-title">${sim.title || sim.name}</div>
              <div class="similar-meta">${(sim.release_date || sim.first_air_date || '').substring(0, 4)} • ${Math.floor(Math.random() * 20 + 80)}% Match</div>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        console.error('Similar load error', e);
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      if (previewTimeout) clearTimeout(previewTimeout);
      document.body.style.overflow = 'auto';
    }

    function playItem(id, type, event) {
      if (event) event.stopPropagation();
      currentItem = { id, media_type: type };
      playCurrent();
    }

    function playCurrent() {
      if (!currentItem) return;
      const type = currentItem.media_type || (currentItem.first_air_date ? 'tv' : 'movie');
      const id = currentItem.id;

      let url;
      switch(currentServer) {
        case 'embed':
          url = `https://embed.su/embed/${type}/${id}`;
          break;
        case 'moviesapi':
          url = type === 'movie' ? `https://moviesapi.club/movie/${id}` : `https://moviesapi.club/tv/${id}-1-1`;
          break;
        case 'vidlink':
          url = `https://vidlink.pro/${type}/${id}`;
          break;
        case 'autoembed':
          url = `https://player.autoembed.cc/embed/${type}/${id}`;
          break;
        default:
          url = type === 'movie' 
            ? `https://vidsrc.xyz/embed/movie?tmdb=${id}` 
            : `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=1&episode=1`;
      }

      window.open(url, '_blank');
    }

    function playFeatured() {
      currentItem = featuredItem;
      playCurrent();
    }

    function showFeaturedDetails() {
      openModal(featuredItem);
    }

    function changeServer() {
      currentServer = document.getElementById('sourceSelect').value;
    }

    async function toggleFavorite(id, type, event) {
      if (event) event.stopPropagation();

      const index = myList.findIndex(i => i.id === id);
      if (index > -1) {
        myList.splice(index, 1);
      } else {
        // Try to find item in allContent first
        let item = allContent.find(i => i.id === id);

        // If not found, fetch it from API
        if (!item) {
          try {
            const mediaType = type || 'movie';
            const res = await fetch(`${baseURL}/${mediaType}/${id}?api_key=${API_KEY}`);
            item = await res.json();
            item.media_type = mediaType;
          } catch (e) {
            console.error('Error fetching item:', e);
            return;
          }
        }

        if (item) {
          myList.push(item);
        }
      }

      saveMyList();
      loadRows();
      if (currentItem && currentItem.id === id) updateModalFavoriteBtn();
    }

    function toggleCurrentFavorite() {
      if (!currentItem) return;
      const type = currentItem.media_type || (currentItem.first_air_date ? 'tv' : 'movie');
      toggleFavorite(currentItem.id, type);
    }

    function updateModalFavoriteBtn() {
      const btn = document.getElementById('modalFavoriteBtn');
      const isFav = myList.some(i => i.id === currentItem.id);
      btn.textContent = isFav ? '✓' : '+';
      btn.className = 'action-btn ' + (isFav ? 'favorited' : '');
    }

    function saveMyList() {
      const allLists = JSON.parse(localStorage.getItem('classflix_mylists') || '{}');
      allLists[currentUser] = myList;
      localStorage.setItem('classflix_mylists', JSON.stringify(allLists));
    }

    function showMyList() {
      const container = document.getElementById('contentRows');
      container.innerHTML = '';
      if (myList.length > 0) {
        createRow('My List', myList, container);
      } else {
        container.innerHTML = '<div style="padding: 100px; text-align: center; color: #666; font-size: 18px;">Your list is empty. Click the + button on any movie or show to add it here.</div>';
      }
    }

    function toggleSearch() {
      const input = document.getElementById('searchInput');
      input.classList.toggle('active');
      if (input.classList.contains('active')) {
        input.focus();
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const query = e.target.value;
        if (query.length > 0) {
          const res = await fetch(`${baseURL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
          const data = await res.json();
          const container = document.getElementById('contentRows');
          container.innerHTML = '';
          if (data.results) {
            allContent = data.results;
            createRow(`Results for "${query}"`, data.results, container);
          }
        }
      }
    });

    async function filterContent(type) {
      const container = document.getElementById('contentRows');
      container.innerHTML = '';

      let items, title;

      switch(type) {
        case 'anime':
          items = await fetchCategory('discover/tv', { with_genres: 16 });
          title = 'Anime';
          break;
        case 'action':
          items = await fetchCategory('discover/movie', { with_genres: 28 });
          title = 'Action Movies';
          break;
        case 'comedy':
          items = await fetchCategory('discover/movie', { with_genres: 35 });
          title = 'Comedy Movies';
          break;
        case 'horror':
          items = await fetchCategory('discover/movie', { with_genres: 27 });
          title = 'Horror Movies';
          break;
        case 'scifi':
          items = await fetchCategory('discover/movie', { with_genres: 878 });
          title = 'Sci-Fi Movies';
          break;
        case 'tv':
          items = await fetchCategory('tv/popular');
          title = 'Popular TV Shows';
          break;
        case 'movie':
          items = await fetchCategory('movie/popular');
          title = 'Popular Movies';
          break;
        default:
          items = await fetchCategory('trending/all/week');
          title = 'Trending Now';
      }

      createRow(title, items, container);
    }

    function loadHome() {
      loadRows();
    }

    function setupScrollListener() {
      window.addEventListener('scroll', () => {
        const header = document.getElementById('mainHeader');
        if (window.scrollY > 50) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      });
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.addEventListener('load', () => {
      const savedUser = localStorage.getItem('classflix_current_user');
      if (savedUser) {
        currentUser = savedUser;
        document.getElementById('authScreen').style.display = 'none';
        initProfiles();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });
  </script>
</body>
</html>
