<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = document.body.scrollHeight;
}

function initParticles() {
  particles = [];
  const count = Math.floor((W * H) / 12000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2 + .5,
      vx: (Math.random() - .5) * .4,
      vy: (Math.random() - .5) * .4,
      alpha: Math.random() * .6 + .1
    });
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = p.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  ctx.globalAlpha = .06;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = .5;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.globalAlpha = .06 * (1 - dist/100);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}

resize();
initParticles();
animateParticles();
window.addEventListener('resize', () => { resize(); initParticles(); });

function resizeCanvas() {
  const newH = document.body.scrollHeight;
  if (newH !== H) { H = canvas.height = newH; initParticles(); }
}

function openPreview(htmlContent, title) {
  previewTitle.textContent = title || "Game Preview";
  previewOverlay.classList.add('active');
  previewFrame.srcdoc = htmlContent;
}
function closePreview() {
  previewOverlay.classList.remove('active');
  previewFrame.srcdoc = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && previewOverlay.classList.contains('active')) closePreview();
});

function makeCard(title, imageUrl, onClickFn) {
  const card = document.createElement("div");
  card.className = "game-card";
  if (imageUrl) card.style.backgroundImage = "url(" + imageUrl + ")";
  const label = document.createElement("div");
  label.className = "game-name";
  label.textContent = title;
  card.appendChild(label);
  card.onclick = onClickFn;
  return card;
}

function openNoahGame(g) {
  const win = window.open("about:blank", "_blank");
  if (!win) { window.open(g.url, '_blank'); return; }
  fetch(g.url)
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(t => { win.document.open(); win.document.write(t); win.document.close(); })
    .catch(() => {
      win.document.open();
      win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body,html{width:100%;height:100%;overflow:hidden}iframe{border:none;width:100vw;height:100vh}</style></head><body><iframe src="' + g.url + '" allowfullscreen allow="autoplay"></iframe></body></html>');
      win.document.close();
    });
}

function openCsGame(g) {
  const win = window.open("about:blank", "_blank");
  if (!win) return;
  fetch(g.url.replace("{HTML_URL}", HTML))
    .then(r => r.text())
    .then(t => { win.document.open(); win.document.write(t); win.document.close(); })
    .catch(() => win.document.write("<h1 style='color:white;background:#000;padding:20px'>Error loading game</h1>"));
}

let allCsGames = [];
let searchQuery = '';

function doRender() {
  gamesEl.innerHTML = "";
  const q = searchQuery.toLowerCase();
  const seen = new Set();

  const filteredCs = q ? allCsGames.filter(g => g.name.toLowerCase().includes(q)) : allCsGames;
  filteredCs.forEach(g => {
    const key = g.name.toLowerCase().trim();
    if (seen.has(key)) return;
    seen.add(key);
    const coverUrl = g.cover ? g.cover.replace("{COVER_URL}", COVER).replace("{HTML_URL}", HTML) : '';
    gamesEl.appendChild(makeCard(g.name, coverUrl, () => openCsGame(g)));
  });

  const filteredNoah = q ? NOAH_GAMES.filter(g => g.title.toLowerCase().includes(q)) : NOAH_GAMES;
  filteredNoah.forEach(g => {
    if (!g.url || g.url === 'h') return;
    const key = g.title.toLowerCase().trim();
    if (seen.has(key)) return;
    seen.add(key);
    gamesEl.appendChild(makeCard(g.title, g.image, () => openNoahGame(g)));
  });

  setTimeout(resizeCanvas, 100);
  totalEl.textContent = "Total games: " + document.querySelectorAll('.game-card').length;
}

searchEl.oninput = () => { searchQuery = searchEl.value; doRender(); };

fetch(ZONES + "?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(data => {
    allCsGames = data.filter(g => !g.name.toLowerCase().includes("suggest") && !g.name.includes("[!]"));
    doRender();
  })
  .catch(err => {
    console.error("Error loading CS games:", err);
    doRender();
  });
</script>
