<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassroomSpot Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 30px 40px 20px 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }

        .header h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 8px;
            font-style: italic;
        }

        .header .subtitle {
            color: #888888;
            font-size: 1rem;
            font-weight: 400;
        }

        #games {
            flex: 1;
            padding: 20px 40px;
            min-height: 500px;
        }

        .footer {
            padding: 20px 40px;
            background-color: #0d0d0d;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .footer-brand {
            color: #666;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .footer-brand span {
            color: #ffffff;
            font-weight: 500;
        }

        .footer-copyright {
            color: #666;
            font-size: 0.85rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            color: #666;
            font-size: 1.2rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d0d0d;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>classroomspot games</h1>
        <p class="subtitle" id="game-count">Browse and play 1,168 games</p>
    </div>

    <div id="games">
        <div class="loading">Loading games...</div>
    </div>

    <div class="footer">
        
        <div class="footer-copyright">
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
    <script>
        Lumin.init({
            container: '#games',
            theme: 'dark'
        });

        setTimeout(() => {
            const gamesContainer = document.querySelector('#games');
            const gameCards = gamesContainer.querySelectorAll('[data-game], .game-card, .lumin-game');

            if (gameCards.length > 0) {
                document.getElementById('game-count').textContent = `Browse and play ${gameCards.length.toLocaleString()} games`;
            }
        }, 3000);
    </script>
</body>
</html>
